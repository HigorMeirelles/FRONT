		<script>
/**
 * Liga um .progress-bar-circle:
 * - Lê <progress max / value>
 * - Atualiza o 2º <circle> (barra) com stroke-dashoffset
 * - Atualiza o <span> com o percentual
 */
function setupProgressCircle(root) {
  if (!root) return;

  const progress = root.querySelector('progress');
  const svg = root.querySelector('svg');
  const circles = svg ? svg.querySelectorAll('circle') : [];
  const track = circles[0];
  const bar = circles[1];
  const label = root.querySelector('span');

  if (!progress || !bar) return;

  // Calcula a circunferência com base no raio do círculo do progresso
  const r = parseFloat(bar.getAttribute('r')) || 54;
  const circumference = 2 * Math.PI * r;

  // Garante stroke-dasharray conforme o SVG atual
  bar.style.strokeDasharray = String(circumference);

  // Função de renderização (chame sempre que value/max mudarem)
  function render() {
    const max = Number(progress.max) || 100;
    const val = Math.min(Math.max(Number(progress.value) || 0, 0), max);
    const pct = (val / max) * 100;

    const offset = circumference - (circumference * pct / 100);
    bar.style.strokeDashoffset = String(offset);

    if (label) label.textContent = Math.round(pct) + '%';
  }

  // Observa mudanças de atributos no <progress> (value/max)
  const mo = new MutationObserver(render);
  mo.observe(progress, { attributes: true, attributeFilter: ['value', 'max'] });

  // Também reage a eventos comuns de formulário
  progress.addEventListener('input', render);
  progress.addEventListener('change', render);

  // Render inicial
  render();

  // API opcional: helper para atualizar valor via código
  root.setProgressValue = (newValue) => {
    progress.value = newValue;
    // garantir disparo do MutationObserver caso o atributo não seja atualizado
    progress.setAttribute('value', String(newValue));
    render();
  };

  return { render };
}

// Auto-init para todos os elementos existentes na página
document.querySelectorAll('.progress-bar-circle').forEach(setupProgressCircle);
</script>
