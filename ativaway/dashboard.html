<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Graficos</title>
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="../arquivos/css/base.css">
<link rel="stylesheet" href="../arquivos/css/effect1.css">
<link rel="stylesheet" href="../arquivos/css/grafico.css">
<script type="module" src="../arquivos/js/ui.js"></script>
</head>
<body>
	<header>
		<h1>Dashboard</h1>
	</header>

	<main data-dashboard="graficos" aria-label="Exemplos de graficos">
		<header class="painel">
			<div>
				<p>Componente base</p>
				<h2>Graficos</h2>
				<small>Mesmo conceito da tabela: estrutura previsivel no componente e cores centralizadas no layout.</small>
			</div>
		</header>

		<section class="dupla" aria-label="Primeira linha de graficos">
			<article id="grafico-certidoes-carteira" class="grafico barra vertical" data-grafico>
				<script type="application/json">
					{
						"titulo": "Carteira por status",
						"filtros": ["Validas", "Alertas", "Vencidas"],
						"subfiltros": true,
						"valores": [
							{
								"label": "Semana",
								"valores": [
									{ "label": "Grupo Alpha", "valores": [84, 11, 5] },
									{ "label": "Grupo Beta", "valores": [72, 16, 8] },
									{ "label": "Grupo Gama", "valores": [63, 10, 4] },
									{ "label": "Grupo Delta", "valores": [55, 8, 6] }
								]
							},
							{
								"label": "Mes",
								"valores": [
									{ "label": "Grupo Alpha", "valores": [312, 42, 13] },
									{ "label": "Grupo Beta", "valores": [280, 57, 19] },
									{ "label": "Grupo Gama", "valores": [244, 31, 11] },
									{ "label": "Grupo Delta", "valores": [221, 29, 17] }
								]
							}
						]
					}
				</script>
			</article>

			<article id="grafico-certidoes-origens" class="grafico circulo horizontal" data-grafico>
				<script type="application/json">
					{
						"titulo": "Origem das certidoes consultadas",
						"filtros": ["Federal", "Estadual", "Municipal", "Trabalhista"],
						"valores": [
							{ "label": "Federal", "valores": [184] },
							{ "label": "Estadual", "valores": [136] },
							{ "label": "Municipal", "valores": [98] },
							{ "label": "Trabalhista", "valores": [57] }
						]
					}
				</script>
			</article>
		</section>

		<section class="dupla" aria-label="Segunda linha de graficos">
			<article id="grafico-certidoes-emissores" class="grafico linha horizontal" data-grafico>
				<script type="application/json">
					{
						"titulo": "Emissores com maior movimentacao",
						"filtros": ["Consultadas", "Renovadas"],
						"valores": [
							{ "label": "Receita Federal", "valores": [142, 84] },
							{ "label": "SEFAZ/SP", "valores": [118, 63] },
							{ "label": "Prefeitura Manaus", "valores": [91, 48] },
							{ "label": "TST", "valores": [67, 39] },
							{ "label": "PGE/AM", "valores": [52, 27] }
						]
					}
				</script>
			</article>

			<article id="grafico-certidoes-pendencias" class="grafico setor vertical" data-grafico>
				<script type="application/json">
					{
						"titulo": "Distribuicao das pendencias abertas",
						"filtros": ["Documento", "Portal", "Captcha", "Revisao"],
						"valores": [
							{ "label": "Documento", "valores": [22] },
							{ "label": "Portal", "valores": [13] },
							{ "label": "Captcha", "valores": [7] },
							{ "label": "Revisao", "valores": [11] }
						]
					}
				</script>
			</article>
		</section>
	</main>

	<footer>
		<p>&copy; 2026 - Sistema Dashboard</p>
	</footer>
</body>
</html>
